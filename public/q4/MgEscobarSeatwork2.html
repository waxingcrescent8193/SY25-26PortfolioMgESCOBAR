<!DOCTYPE html>
<html>
    <head>
        <meta name="author" content="Joanna Escobar" />
        <meta name="revised" content="March 26, 2026" />
        <style>
            body { font-family: Arial, sans-serif; }
            .header, .footer {
                background: lightblue;
                padding: 10px;
            }

            .footer {
                opacity: 0.5;
                position: fixed;
                bottom: 0;
                width: 100%;
            }

            .sidebar {
                background: lightgreen;
                width: 150px;
                height: 200px;
                position: relative;
                top: 20px;
                left: 20px;
            }

            .content {
                background: lightyellow;
                width: 300px;
                height: 200px;
                position: fixed;
                top: 66px;
                left: 400px;
                z-index: 1;
            } 
            
            .notice {
                position: absolute;
                right: 0;
                background: orange;
                padding: 10px;
                z-index: 2;
            }
        </style>
    </head>

    <body>
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Main Content
            <div class="notice"> Notice! </div>
        </div>
        <div class="footer">Footer</div>
    </body>
</html>
