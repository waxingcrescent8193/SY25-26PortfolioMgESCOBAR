<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Movie Suggestions </title>

    <link rel="stylesheet" href="1stGraded.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font - awesome/5.15.3/css/all.min.css">
</head>

<body>
    <div>
        <form>
            <h2> Add a Movie </h2>

            <label> Title:</br/>
                <input type="text" id="title" name="title"></br/>
            </label>

            <label> Year: </br/>
                <input type="text" id="year" name="year"></br/>
            </label>

            <label class="selection"> Genre
            <select>
                <option value="Action"> Action </option> 
                <option value="Adventure"> Adventure </option>
                <option value="Animation"> Animation </option>
                <option value="Comedy"> Comedy </option>
                <option value="Documentary"> Documentary </option>
                <option value="Drama"> Drama </option>
                <option value="Fantasy"> Fantasy </option>
                <option value="Historical"> Historical </option>
                <option value="Horror"> Horror </option>
                <option value="sci-fi"> Sci-Fi </option>
                <option value="Mystery"> Mystery </option>
                <option value="Romance"> Romance </option>
                <option value="Thriller"> Thriller </option>
            </select></label></br/>

            <label>
                Rating:
            </label>

            <div class="rating">
                <div class="stars"> <!-- reverse order-->
                    <input type="radio" id="s5" name="rating" value="5" /><label for="s5" title="5 Stars">&#9733;</label>
                    <input type="radio" id="s4" name="rating" value="4" /><label for="s4" title="4 Stars">&#9733;</label>
                    <input type="radio" id="s3" name="rating" value="3" /><label for="s3" title="3 Stars">&#9733;</label>
                    <input type="radio" id="s2" name="rating" value="2" /><label for="s2" title="2 Stars">&#9733;</label>
                    <input type="radio" id="s1" name="rating" value="1" /><label for="s1" title="1 Star">&#9733;</label>
                </div>
            </div>

            <input type="submit" value="Add Movie">
        </form> 

        <hr width="100%" size="1"> 

        <section>
            <h2> Movie List </h2>

            <span id="submittedMovies"></span>
        </section>
    </div>
</body>
</html>
